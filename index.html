<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-g">
    <title>Canvas Notes - Full App</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        #mainCanvas {
            border: 2px solid #333;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        #controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4A90E2;
            color: white;
        }
        button:hover {
            background-color: #357ABD;
        }
        #dictatedText {
            width: 800px;
            height: 200px;
            font-size: 16px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Smart Note Taker</h1>

    <canvas id="mainCanvas" width="800" height="400"></canvas>

    <div id="controls">
        <button id="startDictation">Start Dictation</button>
    </div>

    <textarea id="dictatedText" placeholder="Your transcribed text will appear here..."></textarea>

    <script src="app.js"></script>

</body>
</html>
